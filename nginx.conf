# Redirect lawniczak.me → lawniczak.pl
server {
    listen 80;
    server_name lawniczak.me www.lawniczak.me;
    return 301 https://lawniczak.pl$request_uri;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML — no cache (allow updates)
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # All routes → index.html (not needed for static site, but harmless)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
